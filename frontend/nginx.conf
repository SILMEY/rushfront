server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Cache long terme pour les assets hachés (Vite les hash automatiquement)
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html : pas de cache pour que les nouvelles versions soient prises en compte
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Toutes les routes SPA → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
