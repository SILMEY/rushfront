<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#121a2d"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="55%" r="65%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="0.5" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <!-- Stylized map lines -->
  <g opacity="0.55" filter="url(#soft)">
    <path d="M120 650 C 300 560, 420 520, 610 500 C 760 485, 900 520, 1040 580 C 1200 650, 1320 690, 1500 710"
          fill="none" stroke="#60a5fa" stroke-width="10" stroke-linecap="round"/>
    <path d="M120 650 C 300 560, 420 520, 610 500 C 760 485, 900 520, 1040 580 C 1200 650, 1320 690, 1500 710"
          fill="none" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>

    <path d="M160 260 C 360 260, 520 310, 700 360 C 860 405, 1040 405, 1260 340"
          fill="none" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
    <path d="M160 260 C 360 260, 520 310, 700 360 C 860 405, 1040 405, 1260 340"
          fill="none" stroke="#b45309" stroke-width="4" stroke-linecap="round"/>

    <path d="M260 820 C 420 700, 560 640, 720 620 C 920 595, 1080 640, 1260 760"
          fill="none" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
    <path d="M260 820 C 420 700, 560 640, 720 620 C 920 595, 1080 640, 1260 760"
          fill="none" stroke="#166534" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <g filter="url(#shadow)">
    <text x="800" y="410" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
          font-size="160" font-weight="900" letter-spacing="2" fill="url(#steel)" stroke="#0b0f14" stroke-width="10">
      Rush
    </text>
    <text x="1035" y="410" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
          font-size="160" font-weight="900" letter-spacing="2" fill="url(#gold)" stroke="#0b0f14" stroke-width="10">
      Front
    </text>
  </g>

  <!-- Sub text -->
  <text x="800" y="500" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
        font-size="28" fill="#cbd5e1" opacity="0.85">
    Stratégie • Territoires • Économie
  </text>
</svg>

